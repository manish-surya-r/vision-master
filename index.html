<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision Master | Screen-Based Eye Training</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --surface: #ffffff;
        --surface-2: #eef3ff;
        --text: #1e293b;
        --muted: #4a5a74;
        --primary: #4f7cff;
        --primary-soft: #dfe8ff;
        --success: #1f9d6c;
        --warning: #d98324;
        --border: #d9e1ef;
        --shadow: 0 16px 40px rgba(46, 76, 130, 0.09);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #ecf4ff, var(--bg));
      }

      .container { width: min(1120px, 92vw); margin: 0 auto; }

      header {
        position: sticky;
        top: 0;
        z-index: 30;
        border-bottom: 1px solid var(--border);
        background: rgba(243, 246, 251, 0.92);
        backdrop-filter: blur(12px);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.95rem 0;
      }

      .brand h1 { margin: 0; font-size: 1.2rem; }
      .brand p { margin: 0; color: var(--muted); font-size: 0.9rem; }

      nav { display: flex; flex-wrap: wrap; gap: 0.45rem; }

      .nav-btn,
      .btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 999px;
        padding: 0.55rem 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.2s ease;
      }

      .btn.primary,
      .nav-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: transparent;
      }

      .btn:hover,
      .nav-btn:hover { transform: translateY(-1px); }

      main { padding: 1.2rem 0 2.5rem; }

      .page { display: none; animation: fade 0.35s ease; }
      .page.active { display: block; }

      @keyframes fade {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .hero {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 1rem;
        align-items: stretch;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }

      .hero h2 { font-size: clamp(1.5rem, 3vw, 2.25rem); margin: 0 0 0.7rem; }
      .hero p { color: var(--muted); line-height: 1.55; }

      .quick-stats { display: grid; gap: 0.7rem; }
      .mini {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        background: var(--surface-2);
      }

      .section-title { margin: 0 0 0.85rem; }
      .exercise-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }

      .exercise-card h3 { margin: 0 0 0.4rem; font-size: 1.05rem; }
      .exercise-card p { margin: 0.28rem 0; color: var(--muted); line-height: 1.45; font-size: 0.93rem; }
      .tag {
        display: inline-block;
        border-radius: 999px;
        background: var(--primary-soft);
        color: #2346a4;
        font-weight: 700;
        font-size: 0.8rem;
        padding: 0.2rem 0.62rem;
        margin-bottom: 0.45rem;
      }

      .session-layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 1rem;
      }

      .target-zone {
        min-height: 250px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--border);
        border-radius: 14px;
        background: linear-gradient(145deg, #f7faff, #edf3ff);
        margin-top: 0.85rem;
        position: relative;
        overflow: hidden;
      }

      .target-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff, #4f7cff);
        box-shadow: 0 0 0 8px rgba(79, 124, 255, 0.12);
        transition: transform 1.1s ease;
      }

      .progress {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #e8eef9;
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #4f7cff, #64b5ff);
        transition: width 0.35s ease;
      }

      .cue {
        font-weight: 700;
        color: var(--success);
        min-height: 1.2rem;
        margin-top: 0.5rem;
      }

      .rest-overlay {
        position: fixed;
        inset: 0;
        background: rgba(25, 35, 60, 0.78);
        color: white;
        display: none;
        place-items: center;
        z-index: 100;
      }

      .rest-overlay.active { display: grid; }

      .symptoms { display: grid; gap: 0.55rem; margin-top: 0.85rem; }
      .symptoms label { display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }
      .symptoms input[type="range"] { width: 55%; }

      footer {
        padding: 1rem 0 2rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 960px) {
        .hero,
        .session-layout,
        .exercise-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <div class="brand">
          <h1>Vision Master</h1>
          <p>Screen-based visual skills training</p>
        </div>
        <nav id="nav"></nav>
      </div>
    </header>

    <main class="container">
      <section id="home" class="page active"></section>
      <section id="library" class="page"></section>
      <section id="session" class="page"></section>
      <section id="progress" class="page"></section>
      <section id="science" class="page"></section>
    </main>

    <div class="rest-overlay" id="restOverlay"></div>

    <footer class="container">
      <p>
        Disclaimer: Vision Master is a development-stage training tool for practicing visual skills and comfort habits.
        It does not diagnose, treat, or cure eye conditions and is not a substitute for care from a licensed eye-care professional.
      </p>
    </footer>

    <script>
      const EXERCISES = [
        { id: 1, name: "Pencil Push-Up Simulator", trains: "Convergence", how: "A central target moves from far to near. Keep it single and clear as long as possible.", distance: "50–70 cm", eyes: "Both eyes", science: "Trains near-point convergence and sustained binocular control for near tasks." },
        { id: 2, name: "Brock String on Screen", trains: "Binocular coordination & depth perception", how: "Shift focus between 3–5 virtual beads at near, mid, and far positions.", distance: "60–80 cm", eyes: "Both eyes", science: "Supports coordinated vergence shifts and depth awareness across distances." },
        { id: 3, name: "Near–Far Focus Switch", trains: "Accommodation flexibility", how: "Alternate attention between a near target and a far target on screen.", distance: "50–70 cm", eyes: "Both eyes", science: "Practices accommodation changes that support variable viewing demands." },
        { id: 4, name: "Smooth Pursuit Tracker", trains: "Smooth tracking", how: "Follow a moving dot smoothly with your eyes only; keep head still.", distance: "60–75 cm", eyes: "Both eyes", science: "Targets pursuit eye movement quality and gaze stability while tracking motion." },
        { id: 5, name: "Saccade Jump Drill", trains: "Rapid eye movements", how: "Move gaze quickly between distant targets without moving the head.", distance: "60–75 cm", eyes: "Both eyes", science: "Practices fast saccades useful for reading shifts and visual scanning." },
        { id: 6, name: "Visual Search Challenge", trains: "Attention & reaction time", how: "Find the target symbol among distractors as quickly as you can.", distance: "60–80 cm", eyes: "Both eyes", science: "Combines selective attention, pattern discrimination, and quick visual decisions." },
        { id: 7, name: "Single-Eye Occlusion Focus", trains: "Monocular control & eye independence", how: "Cover one eye gently and complete fixation/tracking with the open eye.", distance: "50–70 cm", eyes: "Single eye", science: "Encourages monocular fixation control and balanced use of each eye." },
        { id: 8, name: "Alternating Eye Fixation", trains: "Interocular switching & fixation stability", how: "Alternate which eye is open while holding focus on a central target.", distance: "50–70 cm", eyes: "Single eye", science: "Builds awareness of eye switching and steadier fixation maintenance." },
        { id: 9, name: "Peripheral Awareness Rings", trains: "Peripheral awareness & scanning", how: "Keep gaze centered while noticing brief side flashes and rings.", distance: "60–80 cm", eyes: "Both eyes", science: "Challenges attention spread and peripheral detection while central fixation is maintained." },
        { id: 10, name: "Contrast and Letter Clarity Drill", trains: "Visual discrimination & fixation quality", how: "Identify letters/symbols while contrast and sharpness gradually change.", distance: "60–80 cm", eyes: "Both eyes", science: "Practices detail discrimination under changing visibility demand." }
      ];

      const PAGES = ["home", "library", "session", "progress", "science"];
      const symptomKeys = ["strain", "blur", "headache", "dryness", "comfort"];

      const defaultProgress = { sessions: 0, streak: 0, lastDate: null, totalMinutes: 0, symptomHistory: [] };
      const data = JSON.parse(localStorage.getItem("visionMasterProgress") || "null") || defaultProgress;

      let sessionState = {
        active: false,
        index: 0,
        startMs: null,
        completed: [],
        mode: "both",
        restSeconds: 12,
        cue: "",
        summary: null
      };

      const nav = document.getElementById("nav");
      const pages = Object.fromEntries(PAGES.map((p) => [p, document.getElementById(p)]));

      function persist() {
        localStorage.setItem("visionMasterProgress", JSON.stringify(data));
      }

      function todayISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function updateStreak() {
        const today = todayISO();
        if (!data.lastDate) {
          data.streak = 1;
        } else {
          const prev = new Date(data.lastDate);
          const now = new Date(today);
          const dayDiff = Math.round((now - prev) / 86400000);
          if (dayDiff === 1) data.streak += 1;
          else if (dayDiff > 1) data.streak = 1;
        }
        data.lastDate = today;
      }

      function playCue() {
        sessionState.cue = "Step complete ✓";
        renderSession();
        setTimeout(() => {
          sessionState.cue = "";
          renderSession();
        }, 800);
      }

      function setPage(pageId) {
        PAGES.forEach((page) => {
          pages[page].classList.toggle("active", page === pageId);
        });
        [...nav.children].forEach((btn) => btn.classList.toggle("active", btn.dataset.page === pageId));
        if (pageId === "progress") renderProgress();
      }

      function renderNav() {
        nav.innerHTML = "";
        PAGES.forEach((page) => {
          const b = document.createElement("button");
          b.className = "nav-btn";
          b.textContent = page[0].toUpperCase() + page.slice(1);
          b.dataset.page = page;
          b.onclick = () => setPage(page);
          nav.appendChild(b);
        });
        setPage("home");
      }

      function exerciseCard(ex, compact = false) {
        return `
          <article class="card exercise-card">
            <span class="tag">Exercise ${ex.id}</span>
            <h3>${ex.name}</h3>
            <p><strong>What it trains:</strong> ${ex.trains}</p>
            <p><strong>How to perform:</strong> ${ex.how}</p>
            <p><strong>Recommended distance:</strong> ${ex.distance}</p>
            <p><strong>Eyes used:</strong> ${ex.eyes}</p>
            ${compact ? "" : `<button class="btn" onclick="openSessionFrom(${ex.id - 1})">Start from this exercise</button>`}
          </article>
        `;
      }

      function renderHome() {
        pages.home.innerHTML = `
          <div class="hero">
            <section class="card">
              <h2>Train visual skills with calm, guided screen sessions.</h2>
              <p>
                Vision Master focuses on convergence, accommodation, tracking, scanning, and visual comfort.
                It is designed for laptop/desktop use and follows medically cautious language for portfolio-ready UX.
              </p>
              <p>
                Sessions are structured with short steps, brief rest periods, and simple symptom check-ins.
                Results vary by person and consistent habits matter.
              </p>
              <button class="btn primary" onclick="setPage('library')">Quick Start</button>
            </section>
            <aside class="quick-stats">
              <div class="card mini"><strong>10</strong><br/>Distinct exercises</div>
              <div class="card mini"><strong>12s</strong><br/>Guided rest between steps</div>
              <div class="card mini"><strong>${data.sessions}</strong><br/>Sessions completed</div>
            </aside>
          </div>
        `;
      }

      function renderLibrary() {
        pages.library.innerHTML = `
          <section>
            <h2 class="section-title">Exercise Library</h2>
            <div class="exercise-grid">${EXERCISES.map((ex) => exerciseCard(ex)).join("")}</div>
            <div style="margin-top:1rem;display:flex;gap:.6rem;flex-wrap:wrap;">
              <button class="btn primary" onclick="startSession()">Start Session</button>
              <button class="btn" onclick="setPage('science')">Read the science notes</button>
            </div>
          </section>
        `;
      }

      function motionStyle(index) {
        const phase = (Date.now() / 1000 + index) % 6;
        const x = Math.sin(phase) * 90;
        const y = Math.cos(phase * 1.3) * 50;
        return `transform: translate(${x}px, ${y}px);`;
      }

      function renderSession() {
        const ex = EXERCISES[sessionState.index];
        const progressPct = ((sessionState.index + (sessionState.active ? 0 : 1)) / EXERCISES.length) * 100;

        if (sessionState.summary) {
          const s = sessionState.summary;
          pages.session.innerHTML = `
            <section class="card">
              <h2>Session Summary</h2>
              <p>Completed exercises: <strong>${s.completed}</strong> / 10</p>
              <p>Total time: <strong>${s.minutes} minutes</strong></p>
              <p>Mode used: <strong>${s.modeLabel}</strong></p>
              <button class="btn" onclick="setPage('progress')">View Progress</button>
              <button class="btn primary" onclick="startSession()">Start Another Session</button>
              <form id="symptomForm" class="symptoms">
                ${symptomKeys.map((k) => `<label>${k[0].toUpperCase() + k.slice(1)} <input type='range' min='1' max='5' value='3' name='${k}' /></label>`).join("")}
                <button class="btn" type="submit">Save Symptom Check</button>
              </form>
            </section>
          `;
          document.getElementById("symptomForm").onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const payload = Object.fromEntries(symptomKeys.map((k) => [k, Number(fd.get(k))]));
            payload.date = todayISO();
            data.symptomHistory.unshift(payload);
            data.symptomHistory = data.symptomHistory.slice(0, 20);
            persist();
            alert("Symptom check saved.");
          };
          return;
        }

        pages.session.innerHTML = `
          <div class="session-layout">
            <section class="card">
              <h2>${ex.name}</h2>
              <p><strong>Trains:</strong> ${ex.trains}</p>
              <p>${ex.how}</p>
              <p><strong>Recommended distance:</strong> ${ex.distance}</p>

              <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem;">
                <button class="btn ${sessionState.mode === "both" ? "primary" : ""}" onclick="setMode('both')">Both eyes</button>
                <button class="btn ${sessionState.mode === "single" ? "primary" : ""}" onclick="setMode('single')" ${ex.eyes === "Both eyes" ? "disabled" : ""}>Single eye</button>
              </div>

              <div class="target-zone">
                <div class="target-dot" style="${motionStyle(sessionState.index)}"></div>
              </div>
              <div class="cue">${sessionState.cue}</div>
            </section>

            <aside class="card">
              <h3 style="margin-top:0;">Session Flow</h3>
              <p>Exercise ${sessionState.index + 1} of 10</p>
              <div class="progress"><span style="width:${progressPct}%"></span></div>
              <p style="margin-top:.6rem; color:var(--muted);">Use gentle focus, blink normally, and pause if discomfort increases.</p>
              <button class="btn primary" style="width:100%;margin-bottom:.45rem;" onclick="completeStep()">Mark Step Complete</button>
              <button class="btn" style="width:100%;" onclick="nextExercise()">Next Exercise</button>
            </aside>
          </div>
        `;
      }

      function setMode(mode) {
        sessionState.mode = mode;
        renderSession();
      }

      function openSessionFrom(idx) {
        startSession(idx);
      }

      function startSession(startIndex = 0) {
        sessionState = {
          active: true,
          index: startIndex,
          startMs: Date.now(),
          completed: [],
          mode: "both",
          restSeconds: 12,
          cue: "",
          summary: null
        };
        renderSession();
        setPage("session");
      }

      function completeStep() {
        if (!sessionState.completed.includes(sessionState.index)) {
          sessionState.completed.push(sessionState.index);
        }
        playCue();
      }

      function showRest(nextFn) {
        const overlay = document.getElementById("restOverlay");
        let secs = sessionState.restSeconds;
        overlay.classList.add("active");
        const tick = () => {
          overlay.innerHTML = `<div class='card' style='text-align:center;max-width:420px;'>
            <h3>Rest Screen</h3>
            <p>Relax your eyes, blink gently, and breathe.</p>
            <p><strong>${secs}s</strong> until the next exercise.</p>
          </div>`;
          if (secs <= 0) {
            overlay.classList.remove("active");
            nextFn();
            return;
          }
          secs -= 1;
          setTimeout(tick, 1000);
        };
        tick();
      }

      function nextExercise() {
        if (sessionState.index < EXERCISES.length - 1) {
          showRest(() => {
            sessionState.index += 1;
            renderSession();
          });
          return;
        }

        const ms = Date.now() - sessionState.startMs;
        const minutes = Math.max(1, Math.round(ms / 60000));
        data.sessions += 1;
        data.totalMinutes += minutes;
        updateStreak();
        persist();

        sessionState.summary = {
          completed: sessionState.completed.length,
          minutes,
          modeLabel: sessionState.mode === "both" ? "Both eyes" : "Single eye"
        };
        sessionState.active = false;
        renderSession();
      }

      function symptomAverages() {
        if (!data.symptomHistory.length) return null;
        const totals = Object.fromEntries(symptomKeys.map((k) => [k, 0]));
        data.symptomHistory.forEach((entry) => symptomKeys.forEach((k) => (totals[k] += entry[k])));
        const n = data.symptomHistory.length;
        return Object.fromEntries(symptomKeys.map((k) => [k, (totals[k] / n).toFixed(1)]));
      }

      function renderProgress() {
        const avg = symptomAverages();
        pages.progress.innerHTML = `
          <section class="card">
            <h2>Progress Dashboard</h2>
            <div class="exercise-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));">
              <div class="mini"><strong>${data.sessions}</strong><br/>Sessions</div>
              <div class="mini"><strong>${data.streak}</strong><br/>Day streak</div>
              <div class="mini"><strong>${data.totalMinutes}</strong><br/>Minutes trained</div>
            </div>
            <p style="margin-top:.8rem;color:var(--muted);">Track your comfort trends over time and adjust pacing as needed.</p>
            ${avg ? `<div class='symptoms'>${symptomKeys.map((k) => `<label>${k}: <strong>${avg[k]}/5</strong></label>`).join("")}</div>` : "<p>No symptom entries yet. Complete a session to add one.</p>"}
          </section>
        `;
      }

      function renderScience() {
        pages.science.innerHTML = `
          <section class="card">
            <h2>Science & Training Notes</h2>
            <p style="color:var(--muted);">These exercises are research-inspired visual skill drills. They may support comfort and performance for some users, but outcomes vary and professional guidance is best for persistent symptoms.</p>
            <div class="exercise-grid">${EXERCISES.map((e) => `<article class='card exercise-card'><h3>${e.name}</h3><p><strong>Primary skill:</strong> ${e.trains}</p><p>${e.science}</p></article>`).join("")}</div>
          </section>
        `;
      }

      renderNav();
      renderHome();
      renderLibrary();
      renderSession();
      renderProgress();
      renderScience();
      window.setPage = setPage;
      window.startSession = startSession;
      window.nextExercise = nextExercise;
      window.completeStep = completeStep;
      window.openSessionFrom = openSessionFrom;
      window.setMode = setMode;
    </script>
  </body>
</html>
