<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Master</title>
  <style>
    :root {
      --bg: #f4f7fc;
      --surface: #ffffff;
      --surface-soft: #eef4ff;
      --text: #1f2b42;
      --muted: #5a6880;
      --primary: #4d74ff;
      --primary-soft: #dfe8ff;
      --success: #1f9a67;
      --border: #d9e3f1;
      --shadow: 0 14px 32px rgba(33, 61, 110, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #eaf1ff, var(--bg));
    }

    .container { width: min(1120px, 92vw); margin: 0 auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 252, 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
    }

    .brand h1 { margin: 0; font-size: 1.2rem; }
    .brand p { margin: 0; font-size: 0.9rem; color: var(--muted); }

    nav { display: flex; flex-wrap: wrap; gap: 0.45rem; }

    .btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      padding: 0.5rem 0.95rem;
      cursor: pointer;
      transition: transform 0.14s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.active, .btn.primary { background: var(--primary); color: #fff; border-color: transparent; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn.block { width: 100%; margin-top: 0.45rem; }

    main { padding: 1.2rem 0 2rem; }
    .page { display: none; animation: fade 0.3s ease; }
    .page.active { display: block; }

    @keyframes fade { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .hero-layout { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 1rem; }
    .hero h2 { margin: 0 0 .7rem; font-size: clamp(1.55rem, 3vw, 2.25rem); }
    .hero p { color: var(--muted); line-height: 1.55; }

    .stats { display: grid; gap: .7rem; }
    .stat {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: .75rem;
    }
    .stat strong { display: block; font-size: 1.3rem; }
    .stat span { color: var(--muted); font-size: .92rem; }

    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .9rem; gap: .7rem; }

    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .85rem; }

    .exercise-card h3 { margin: .2rem 0 .45rem; }
    .exercise-card p { margin: .28rem 0; color: var(--muted); font-size: .93rem; line-height: 1.45; }
    .pill {
      display: inline-block;
      background: var(--primary-soft);
      color: #294cad;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 700;
      padding: .2rem .6rem;
      margin-bottom: .3rem;
    }

    .session-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; position: relative; }
    .toggle-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }

    .target-zone {
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: linear-gradient(145deg, #f8fbff, #edf4ff);
      min-height: 260px;
      margin-top: .75rem;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .target-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, #4d74ff);
      box-shadow: 0 0 0 8px rgba(77, 116, 255, .14);
      transition: transform .8s ease;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8eefb;
      margin: .5rem 0;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #4d74ff, #6cb6ff);
      transition: width .3s ease;
    }

    .cue {
      min-height: 24px;
      margin-top: .5rem;
      color: transparent;
      font-weight: 700;
      transition: color .2s ease;
    }
    .cue.show { color: var(--success); }

    .rest-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(20, 30, 48, 0.72);
      z-index: 100;
    }
    .rest-overlay.active { display: grid; }

    .symptoms { display: grid; gap: .5rem; margin-top: .75rem; }
    .symptoms label { display: grid; grid-template-columns: 95px 1fr 28px; align-items: center; gap: .55rem; }

    .metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: .75rem; margin-bottom: .8rem; }
    .metric { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 12px; padding: .7rem; }
    .metric strong { display: block; font-size: 1.35rem; }
    .metric span { color: var(--muted); }

    .feedback-list { list-style: none; margin: 0; padding: 0; display: grid; gap: .45rem; }
    .feedback-list li { display: flex; justify-content: space-between; background: #f8fbff; border-radius: 10px; padding: .5rem .65rem; }

    footer { padding: .8rem 0 2rem; color: var(--muted); font-size: .9rem; }

    @media (max-width: 960px) {
      .hero-layout, .grid, .session-layout, .metric-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <div class="brand">
        <h1>Vision Master</h1>
        <p>Guided, screen-based visual skills training</p>
      </div>
      <nav id="nav"></nav>
    </div>
  </header>

  <main class="container">
    <section id="home" class="page active"></section>
    <section id="library" class="page"></section>
    <section id="session" class="page"></section>
    <section id="progress" class="page"></section>
    <section id="science" class="page"></section>
  </main>

  <div id="restOverlay" class="rest-overlay"></div>

  <footer class="container">
    Disclaimer: Vision Master is for visual skill training and comfort habits. It does not diagnose, treat, or cure eye conditions, and does not replace care from a licensed eye-care professional.
  </footer>

  <script>
    const EXERCISES = [
      { id: 1, name: 'Pencil Push-Up Simulator', trains: 'Convergence', how: 'A central target moves from far to near while you keep it single and clear.', distance: 'Laptop at 50–70 cm', eyes: 'Both eyes', science: 'Supports near-point convergence and controlled binocular alignment at near.' },
      { id: 2, name: 'Brock String on Screen', trains: 'Binocular coordination and depth perception', how: 'Shift focus between 3–5 virtual beads at near/mid/far points.', distance: 'Laptop at 60–80 cm', eyes: 'Both eyes', science: 'Trains coordinated vergence changes and depth awareness across distances.' },
      { id: 3, name: 'Near–Far Focus Switch', trains: 'Accommodation flexibility', how: 'Alternate between a near target and a far target on screen.', distance: 'Laptop at 50–70 cm', eyes: 'Both eyes', science: 'Practices focusing flexibility during repeated near-far demand changes.' },
      { id: 4, name: 'Smooth Pursuit Tracker', trains: 'Smooth tracking', how: 'Follow a dot moving smoothly across the screen with eyes only.', distance: 'Laptop at 60–75 cm', eyes: 'Both eyes', science: 'Builds smoother pursuit eye movements and gaze stability.' },
      { id: 5, name: 'Saccade Jump Drill', trains: 'Rapid eye movements', how: 'Look quickly between two or more distant targets on screen.', distance: 'Laptop at 60–75 cm', eyes: 'Both eyes', science: 'Targets saccade speed and precision for efficient gaze shifts.' },
      { id: 6, name: 'Visual Search Challenge', trains: 'Attention and reaction time', how: 'Find a target symbol among distractors as fast as possible.', distance: 'Laptop at 60–80 cm', eyes: 'Both eyes', science: 'Combines scanning, selective attention, and rapid visual decisions.' },
      { id: 7, name: 'Single-Eye Occlusion Focus', trains: 'Monocular control and eye independence', how: 'Cover one eye gently and perform fixation or tracking with the open eye.', distance: 'Laptop at 50–70 cm', eyes: 'Single eye', science: 'Encourages monocular fixation control and eye-specific awareness.' },
      { id: 8, name: 'Alternating Eye Fixation', trains: 'Interocular switching and fixation stability', how: 'Alternate which eye is open while staying focused on a central target.', distance: 'Laptop at 50–70 cm', eyes: 'Single eye', science: 'Practices controlled interocular switching with steady fixation.' },
      { id: 9, name: 'Peripheral Awareness Rings', trains: 'Peripheral awareness and scanning', how: 'Keep gaze on center while noticing brief side flashes or rings.', distance: 'Laptop at 60–80 cm', eyes: 'Both eyes', science: 'Challenges peripheral detection while preserving central fixation.' },
      { id: 10, name: 'Contrast and Letter Clarity Drill', trains: 'Visual discrimination and fixation quality', how: 'Identify letters or symbols at changing contrast or sharpness.', distance: 'Laptop at 60–80 cm', eyes: 'Both eyes', science: 'Trains detail discrimination under changing visual clarity demand.' }
    ];

    const PAGES = ['home', 'library', 'session', 'progress', 'science'];
    const symptomKeys = ['strain', 'blur', 'headache', 'dryness', 'comfort'];

    const state = {
      page: 'home',
      sessionIndex: 0,
      sessionStart: null,
      completed: [],
      mode: 'both',
      cueOn: false,
      restSeconds: 12,
      summary: null,
      symptoms: { strain: 3, blur: 3, headache: 3, dryness: 3, comfort: 3 }
    };

    const progress = JSON.parse(localStorage.getItem('vision_master_progress') || 'null') || {
      sessions: 0,
      streak: 0,
      lastDate: null,
      totalMinutes: 0,
      symptomHistory: []
    };

    const navEl = document.getElementById('nav');
    const pages = Object.fromEntries(PAGES.map((p) => [p, document.getElementById(p)]));
    const restOverlay = document.getElementById('restOverlay');

    function saveProgress() {
      localStorage.setItem('vision_master_progress', JSON.stringify(progress));
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function setPage(pageName) {
      state.page = pageName;
      PAGES.forEach((p) => pages[p].classList.toggle('active', p === pageName));
      [...navEl.children].forEach((b) => b.classList.toggle('active', b.dataset.page === pageName));
      if (pageName === 'progress') renderProgress();
    }

    function navButton(pageName) {
      const b = document.createElement('button');
      b.className = 'btn';
      b.textContent = pageName[0].toUpperCase() + pageName.slice(1);
      b.dataset.page = pageName;
      b.onclick = () => setPage(pageName);
      return b;
    }

    function renderNav() {
      navEl.innerHTML = '';
      PAGES.forEach((p) => navEl.appendChild(navButton(p)));
      setPage('home');
    }

    function exerciseCard(exercise, includeStart = true) {
      return `
        <article class="card exercise-card">
          <span class="pill">Exercise ${exercise.id}</span>
          <h3>${exercise.name}</h3>
          <p><strong>What it trains:</strong> ${exercise.trains}</p>
          <p><strong>How to perform:</strong> ${exercise.how}</p>
          <p><strong>Recommended distance:</strong> ${exercise.distance}</p>
          <p><strong>Eyes used:</strong> ${exercise.eyes}</p>
          ${includeStart ? `<button class="btn" onclick="startSession(${exercise.id - 1})">Start from this exercise</button>` : ''}
        </article>
      `;
    }

    function renderHome() {
      pages.home.innerHTML = `
        <div class="hero-layout">
          <article class="card hero">
            <h2>Train visual skills with calm, structured screen sessions.</h2>
            <p>
              Vision Master supports practice for convergence, accommodation, tracking, scanning, attention, and visual comfort.
              It is designed for laptop-first use while staying responsive.
            </p>
            <p>
              This platform is research-inspired and medically cautious: these drills may help visual skills for some users,
              but outcomes vary and professional care remains essential for persistent symptoms.
            </p>
            <button class="btn primary" onclick="setPage('library')">Quick Start</button>
          </article>
          <aside class="stats">
            <div class="stat"><strong>10</strong><span>Distinct exercises</span></div>
            <div class="stat"><strong>${progress.sessions}</strong><span>Sessions completed</span></div>
            <div class="stat"><strong>${progress.streak}</strong><span>Current streak</span></div>
          </aside>
        </div>
      `;
    }

    function renderLibrary() {
      pages.library.innerHTML = `
        <section>
          <div class="section-head">
            <h2>Exercise Library</h2>
            <button class="btn primary" onclick="startSession(0)">Start Session</button>
          </div>
          <div class="grid">${EXERCISES.map((e) => exerciseCard(e, true)).join('')}</div>
        </section>
      `;
    }

    function playCue() {
      state.cueOn = true;
      renderSession();
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.value = 760;
        g.gain.value = 0.03;
        o.start();
        o.stop(ctx.currentTime + 0.08);
      } catch (_) {}
      setTimeout(() => {
        state.cueOn = false;
        renderSession();
      }, 800);
    }

    function movingTransform(index) {
      const phase = (Date.now() / 900 + index) % 6;
      const x = Math.sin(phase) * 100;
      const y = Math.cos(phase * 1.1) * 36;
      return `translate(${x}px, ${y}px)`;
    }

    function renderSession() {
      const ex = EXERCISES[state.sessionIndex];

      if (state.summary) {
        pages.session.innerHTML = `
          <article class="card">
            <h2>Session Summary</h2>
            <p><strong>Completed exercises:</strong> ${state.summary.completed} / 10</p>
            <p><strong>Time spent:</strong> ${state.summary.minutes} minutes</p>
            <p><strong>Mode at finish:</strong> ${state.summary.modeLabel}</p>
            <button class="btn" onclick="setPage('progress')">View Progress</button>
            <button class="btn primary" onclick="startSession(0)">Start New Session</button>
            <form class="symptoms" id="symptomForm">
              <h3>Symptom Self-Check</h3>
              ${symptomKeys.map((k) => `
                <label>
                  <span>${k[0].toUpperCase() + k.slice(1)}</span>
                  <input type="range" min="1" max="5" value="3" name="${k}" />
                  <span>3</span>
                </label>
              `).join('')}
              <button class="btn" type="submit">Save Symptom Check</button>
            </form>
          </article>
        `;

        document.querySelectorAll('#symptomForm input[type="range"]').forEach((input) => {
          input.addEventListener('input', (e) => {
            e.target.parentElement.querySelector('span:last-child').textContent = e.target.value;
          });
        });

        document.getElementById('symptomForm').onsubmit = (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const payload = { date: todayISO() };
          symptomKeys.forEach((k) => { payload[k] = Number(fd.get(k)); });
          progress.symptomHistory.unshift(payload);
          progress.symptomHistory = progress.symptomHistory.slice(0, 25);
          saveProgress();
          alert('Symptom check saved.');
          renderProgress();
        };
        return;
      }

      const progressPct = ((state.sessionIndex + 1) / EXERCISES.length) * 100;

      pages.session.innerHTML = `
        <div class="session-layout">
          <article class="card">
            <h2>${ex.name}</h2>
            <p><strong>What it trains:</strong> ${ex.trains}</p>
            <p>${ex.how}</p>
            <p><strong>Recommended distance:</strong> ${ex.distance}</p>

            <div class="toggle-row">
              <button class="btn ${state.mode === 'both' ? 'active' : ''}" onclick="setMode('both')">Both eyes</button>
              <button class="btn ${state.mode === 'single' ? 'active' : ''}" onclick="setMode('single')" ${ex.eyes === 'Both eyes' ? 'disabled' : ''}>Single eye</button>
            </div>

            <div class="target-zone">
              <div class="target-dot" style="transform: ${movingTransform(state.sessionIndex)}"></div>
            </div>

            <p class="cue ${state.cueOn ? 'show' : ''}">✓ Step complete</p>
          </article>

          <aside class="card">
            <p><strong>Exercise ${state.sessionIndex + 1}</strong> of ${EXERCISES.length}</p>
            <div class="progress"><span style="width: ${progressPct}%"></span></div>
            <p style="color:var(--muted)">Keep head still, blink naturally, and pause if discomfort increases.</p>
            <button class="btn primary block" onclick="completeStep()">Mark Step Complete</button>
            <button class="btn block" onclick="nextExercise()">Next Exercise</button>
          </aside>
        </div>
      `;
    }

    function setMode(mode) {
      state.mode = mode;
      renderSession();
    }

    function startSession(startIndex = 0) {
      state.sessionIndex = startIndex;
      state.sessionStart = Date.now();
      state.completed = [];
      state.mode = 'both';
      state.summary = null;
      state.cueOn = false;
      setPage('session');
      renderSession();
    }

    function completeStep() {
      if (!state.completed.includes(state.sessionIndex)) {
        state.completed.push(state.sessionIndex);
      }
      playCue();
    }

    function showRestOverlay(seconds, onDone) {
      let left = seconds;
      restOverlay.classList.add('active');
      const tick = () => {
        restOverlay.innerHTML = `
          <div class="card" style="max-width:420px;text-align:center;">
            <h3>Rest Screen</h3>
            <p>Relax your eyes, blink gently, and breathe.</p>
            <p><strong>${left}s</strong> until next exercise.</p>
          </div>
        `;
        if (left <= 0) {
          restOverlay.classList.remove('active');
          onDone();
          return;
        }
        left -= 1;
        setTimeout(tick, 1000);
      };
      tick();
    }

    function updateStreak() {
      const today = todayISO();
      if (!progress.lastDate) {
        progress.streak = 1;
      } else {
        const diff = Math.round((new Date(today) - new Date(progress.lastDate)) / 86400000);
        if (diff === 1) progress.streak += 1;
        else if (diff > 1) progress.streak = 1;
      }
      progress.lastDate = today;
    }

    function finishSession() {
      const minutes = Math.max(1, Math.round((Date.now() - state.sessionStart) / 60000));
      progress.sessions += 1;
      progress.totalMinutes += minutes;
      updateStreak();
      saveProgress();

      state.summary = {
        completed: state.completed.length,
        minutes,
        modeLabel: state.mode === 'both' ? 'Both eyes' : 'Single eye'
      };

      renderHome();
      renderSession();
    }

    function nextExercise() {
      if (state.sessionIndex < EXERCISES.length - 1) {
        showRestOverlay(state.restSeconds, () => {
          state.sessionIndex += 1;
          renderSession();
        });
      } else {
        finishSession();
      }
    }

    function symptomAverages() {
      if (!progress.symptomHistory.length) return null;
      const totals = Object.fromEntries(symptomKeys.map((k) => [k, 0]));
      progress.symptomHistory.forEach((entry) => {
        symptomKeys.forEach((k) => totals[k] += entry[k]);
      });
      return Object.fromEntries(symptomKeys.map((k) => [k, (totals[k] / progress.symptomHistory.length).toFixed(1)]));
    }

    function renderProgress() {
      const avg = symptomAverages();
      pages.progress.innerHTML = `
        <section class="card">
          <h2>Progress</h2>
          <div class="metric-grid">
            <div class="metric"><strong>${progress.sessions}</strong><span>Session count</span></div>
            <div class="metric"><strong>${progress.streak}</strong><span>Streak (days)</span></div>
            <div class="metric"><strong>${progress.totalMinutes}</strong><span>Total minutes</span></div>
          </div>
          <h3>Symptom Feedback</h3>
          ${avg ? `<ul class="feedback-list">${symptomKeys.map((k) => `<li><span>${k}</span><strong>${avg[k]} / 5</strong></li>`).join('')}</ul>` : '<p>No symptom feedback yet. Complete a session and save your self-check.</p>'}
        </section>
      `;
    }

    function renderScience() {
      pages.science.innerHTML = `
        <section class="card">
          <h2>Science</h2>
          <p style="color:var(--muted)">
            These drills are research-informed exercises for training visual skills such as convergence, accommodation,
            tracking, scanning, attention, and comfort. They may help some users, but outcomes vary and this does not replace professional care.
          </p>
          <div class="grid">${EXERCISES.map((e) => `
            <article class="card exercise-card">
              <h3>${e.name}</h3>
              <p><strong>Trains:</strong> ${e.trains}</p>
              <p>${e.science}</p>
            </article>
          `).join('')}</div>
        </section>
      `;
    }

    renderNav();
    renderHome();
    renderLibrary();
    renderSession();
    renderProgress();
    renderScience();

    window.setPage = setPage;
    window.startSession = startSession;
    window.completeStep = completeStep;
    window.nextExercise = nextExercise;
    window.setMode = setMode;
  </script>
</body>
</html>
